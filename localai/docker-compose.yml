# Caddy HTTPS front door for the host-native Ollama server.
# Ollama runs natively on the host (systemd) bound to 127.0.0.1:11434 with Vulkan GPU.
# Caddy uses host networking so it can reach that loopback while terminating TLS on the LAN.
services:
  caddy:
    image: caddy:2
    container_name: ai-https
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - localai_caddy_data:/data
      - localai_caddy_config:/config
    command: caddy run --config /etc/caddy/Caddyfile

volumes:
  localai_caddy_data:
  localai_caddy_config:
