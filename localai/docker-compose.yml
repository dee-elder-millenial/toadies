# LocalAI runtime for the Toadies sidecar.
# CPU inference (the RX 580 / Polaris has no usable ROCm/CUDA path).
# Bound to all interfaces (0.0.0.0) to serve the local network.
# Auth: requires an API key, read from localai/.env (LOCALAI_API_KEY=...).
# The .env file is gitignored — the key is NEVER committed. See RECOVERY.md.
services:
  localai:
    image: localai/localai:latest
    container_name: local-ai
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    environment:
      - MODELS_PATH=/models
      - THREADS=8
      - API_KEY=${LOCALAI_API_KEY:?set LOCALAI_API_KEY in localai/.env (see RECOVERY.md)}
    restart: unless-stopped
