# Toady registry — static routing for the distribution layer.
#
# Single machine: dees-workbench. Ollama auto-shares GPU/CPU on the one box (it spills
# a too-big model's layers onto the CPU by itself), so there is NO separate CPU instance
# or box. The registry still supports multiple boxes + fallback if one is ever added
# later (e.g. the SBE-Lenovo Windows laptop as an occasional worker).

[boxes.workbench]                       # the one box: RX 580 GPU; Ollama spills to CPU as needed
url         = "https://dees-workbench.local/"
api_key_env = "TOADIES_WORKBENCH_KEY"   # optional; ignored if unset

[routing]
fallback = "workbench"

# --- deterministic toadies (in-process, no model, no network) ---
[toadies.gremlin]
tier    = "deterministic"
handler = "gremlin_compress"

[toadies.bouncer]
tier    = "deterministic"
handler = "bouncer_scan"

[toadies.accountant]
tier    = "deterministic"
handler = "accountant_status"

# --- model-backed toady (Ollama on the workbench; GPU with automatic CPU overflow) ---
[toadies.scribe]
tier      = "gpu-model"
box       = "workbench"
model     = "llama3.2:3b"
timeout_s = 30
