<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toadette · Project Shape, Flow & Training Loop</title>
<style>
  :root{
    --bg0:#080a10; --bg1:#0e1320; --ink:#e8eefb; --mut:#8aa0c4;
    --purple:#b07cff; --cyan:#5ad6e0; --green:#37d6a0; --amber:#ffb454;
    --magenta:#ff6ac1; --gold:#ffd866; --blue:#6ea8fe; --red:#ff5d6c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(1200px 800px at 30% 10%,#10182b 0%,var(--bg1) 40%,var(--bg0) 100%);
    color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:18px;
    padding:10px 18px;background:linear-gradient(180deg,rgba(8,10,16,.96),rgba(8,10,16,.6));
    backdrop-filter:blur(6px);border-bottom:1px solid #1d2840}
  header h1{font-size:18px;margin:0;letter-spacing:.5px;white-space:nowrap}
  header h1 b{color:var(--purple)}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12px;color:var(--mut)}
  .legend .k{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .sw{width:12px;height:12px;border-radius:3px;box-shadow:0 0 8px currentColor}
  .ln{width:22px;height:0;border-top:3px solid currentColor}
  .ln.dash{border-top-style:dashed}
  .ln.dot{border-top-style:dotted}
  .ctrls{margin-left:auto;display:flex;gap:8px}
  .ctrls button{background:#16203a;color:var(--ink);border:1px solid #28365a;border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer}
  .ctrls button:hover{background:#1e2c4d;border-color:#3a4f86}
  .hint{position:fixed;bottom:12px;left:18px;z-index:10;font-size:12px;color:var(--mut)}
  #stage{position:fixed;inset:56px 0 0 0;cursor:grab}
  #stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  text{font-family:"Segoe UI",system-ui,sans-serif;fill:var(--ink)}
  .mono{font-family:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,Consolas,monospace}
  .title{font-weight:700}
  .sub{fill:var(--mut)}
</style>
</head>
<body>
<header>
  <h1><b>Toadette</b> · shape, flow &amp; the training loop</h1>
  <div class="legend">
    <span class="k" style="color:var(--blue)"><span class="sw" style="background:currentColor"></span>Human (Dee)</span>
    <span class="k" style="color:var(--gold)"><span class="sw" style="background:currentColor"></span>Paid cloud · Judge/Trainer</span>
    <span class="k" style="color:var(--purple)"><span class="sw" style="background:currentColor"></span>Toadette (orchestrator)</span>
    <span class="k" style="color:var(--cyan)"><span class="sw" style="background:currentColor"></span>Dispatcher/Registry</span>
    <span class="k" style="color:var(--green)"><span class="sw" style="background:currentColor"></span>Deterministic</span>
    <span class="k" style="color:var(--amber)"><span class="sw" style="background:currentColor"></span>CPU-model</span>
    <span class="k" style="color:var(--magenta)"><span class="sw" style="background:currentColor"></span>GPU-model</span>
    <span class="k" style="color:var(--blue)"><span class="ln"></span>request</span>
    <span class="k" style="color:var(--green)"><span class="ln dash"></span>result</span>
    <span class="k" style="color:var(--red)"><span class="ln dash"></span>fallback / demote</span>
    <span class="k" style="color:var(--gold)"><span class="ln dot"></span>grade / mentor</span>
  </div>
  <div class="ctrls">
    <button onclick="zoomBy(1.2)">＋</button>
    <button onclick="zoomBy(0.83)">－</button>
    <button onclick="fit()">Fit</button>
  </div>
</header>

<div id="stage">
<svg id="svg" viewBox="0 0 2860 1820" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="gWork" cx="30%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#16223c"/><stop offset="100%" stop-color="#0c1322"/>
    </radialGradient>
    <radialGradient id="gDesk" cx="50%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#22202c" stop-opacity=".9"/><stop offset="100%" stop-color="#0c1322"/>
    </radialGradient>
    <linearGradient id="gToad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2566"/><stop offset="100%" stop-color="#1e1438"/>
    </linearGradient>
    <linearGradient id="gCloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a14"/><stop offset="100%" stop-color="#15160a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge>
      <feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="aBlue" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/></marker>
    <marker id="aGreen" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#37d6a0"/></marker>
    <marker id="aAmber" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ffb454"/></marker>
    <marker id="aMag" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff6ac1"/></marker>
    <marker id="aRed" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff5d6c"/></marker>
    <marker id="aGold" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ffd866"/></marker>
    <marker id="aCyan" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5ad6e0"/></marker>
  </defs>

  <g id="viewport">

    <!-- ===================== HARDWARE CONTAINERS ===================== -->
    <g filter="url(#soft)"><rect x="470" y="120" width="1560" height="1440" rx="22" fill="url(#gWork)" stroke="#2f4a7a" stroke-width="2"/></g>
    <rect x="470" y="120" width="1560" height="56" rx="22" fill="#15233f"/>
    <text x="500" y="157" class="title" font-size="26">🖥️ dees-workbench.local <tspan class="sub mono" font-size="16">· RX 580 · 8GB VRAM · 15GB RAM · Vulkan · GPU node</tspan></text>

    <g filter="url(#soft)"><rect x="2130" y="120" width="660" height="900" rx="22" fill="url(#gDesk)" stroke="#5a4a2e" stroke-width="2"/></g>
    <rect x="2130" y="120" width="660" height="56" rx="22" fill="#2a2415"/>
    <text x="2160" y="157" class="title" font-size="24">🖳 dees-desktop.local <tspan class="sub mono" font-size="15">· idle CPU</tspan></text>

    <!-- ===================== EDGES (under nodes) ===================== -->
    <!-- chain of command spine -->
    <line x1="240" y1="290" x2="240" y2="1200" stroke="#3a4a6a" stroke-width="2" stroke-dasharray="2 8"/>
    <!-- dee -> toadette (goal) -->
    <path d="M400,360 C470,338 520,332 580,330" fill="none" stroke="#6ea8fe" stroke-width="3" marker-end="url(#aBlue)"/>
    <!-- toadette -> dee (answer) -->
    <path d="M580,408 C500,430 450,420 402,408" fill="none" stroke="#37d6a0" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#aGreen)" opacity=".85"/>
    <!-- cloud -> toadette (mentor / handoff) -->
    <path d="M330,910 C340,690 500,470 585,425" fill="none" stroke="#ffd866" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#aGold)" opacity=".9"/>
    <!-- cloud -> trust (judge grades) -->
    <path d="M400,1120 C470,1200 510,1280 545,1330" fill="none" stroke="#ffd866" stroke-width="3" stroke-dasharray="3 7" marker-end="url(#aGold)"/>
    <!-- trust -> cloud (leash feedback: fewer calls) -->
    <path d="M540,1450 C430,1400 390,1290 372,1185" fill="none" stroke="#ff5d6c" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#aRed)" opacity=".9"/>
    <!-- toadette -> dispatcher -->
    <path d="M810,560 L810,660" fill="none" stroke="#6ea8fe" stroke-width="3" marker-end="url(#aBlue)"/>
    <!-- dispatcher <-> registry -->
    <path d="M1050,730 L1190,730" fill="none" stroke="#5ad6e0" stroke-width="3" marker-end="url(#aCyan)"/>
    <path d="M1190,770 L1050,770" fill="none" stroke="#5ad6e0" stroke-width="2.5" marker-end="url(#aCyan)" opacity=".7"/>
    <!-- dispatcher -> deterministic -->
    <path d="M740,820 L740,910" fill="none" stroke="#37d6a0" stroke-width="3" marker-end="url(#aGreen)"/>
    <!-- dispatcher -> gpu localai -->
    <path d="M1050,810 C1220,880 1280,950 1360,1010" fill="none" stroke="#ff6ac1" stroke-width="3" marker-end="url(#aMag)"/>
    <!-- dispatcher -> desktop cpu localai (LAN) -->
    <path d="M1050,710 C1540,560 1860,470 2160,430" fill="none" stroke="#ffb454" stroke-width="3.5" marker-end="url(#aAmber)"/>
    <!-- fallback: desktop down -> GPU -->
    <path d="M2400,830 C2340,1060 1940,1120 1660,1090" fill="none" stroke="#ff5d6c" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#aRed)"/>
    <!-- result: gpu localai -> toadette -->
    <path d="M1360,1050 C1150,1010 940,720 860,560" fill="none" stroke="#37d6a0" stroke-width="2.5" stroke-dasharray="9 7" marker-end="url(#aGreen)" opacity=".85"/>
    <!-- toady outputs -> trust (to be graded) -->
    <path d="M1360,1230 C1240,1280 1180,1300 1150,1330" fill="none" stroke="#ffd866" stroke-width="2.5" stroke-dasharray="3 7" marker-end="url(#aGold)"/>

    <!-- ===================== CHAIN OF COMMAND (external to boxes) ===================== -->
    <text x="60" y="270" class="mono" font-size="15" fill="#6a7ea4">CHAIN OF COMMAND ▾</text>

    <!-- DEE (1st) -->
    <g filter="url(#soft)"><rect x="60" y="300" width="340" height="170" rx="16" fill="#0f1a30" stroke="#6ea8fe" stroke-width="2.5"/></g>
    <text x="84" y="348" class="title" font-size="25" fill="#bcd6ff">🧑‍✈️ DEE</text>
    <rect x="250" y="320" width="128" height="30" rx="8" fill="#13294a" stroke="#3a6db0"/>
    <text x="314" y="341" text-anchor="middle" class="mono" font-size="13" fill="#9cc2ff">1st in command</text>
    <text x="84" y="382" class="sub" font-size="14.5">the human · sets direction</text>
    <text x="84" y="408" class="sub" font-size="13.5">talks to Toadette day-to-day</text>
    <text x="84" y="444" class="sub mono" font-size="12.5">🍎 Mac · 🪟 PC · workbench</text>

    <!-- CLAUDE / ROBOT — paid cloud (2nd) -->
    <g filter="url(#glow)"><rect x="60" y="900" width="340" height="290" rx="16" fill="url(#gCloud)" stroke="#ffd866" stroke-width="2.5"/></g>
    <text x="84" y="948" class="title" font-size="20" fill="#ffe79a">☁️ CLAUDE / ROBOT</text>
    <rect x="252" y="922" width="130" height="30" rx="8" fill="#2a2410" stroke="#9c8226"/>
    <text x="317" y="943" text-anchor="middle" class="mono" font-size="12.5" fill="#ffe79a">2nd in command</text>
    <text x="84" y="978" class="sub" font-size="13.5">paid cloud AI · over API · 💸 per token</text>
    <rect x="84" y="994" width="292" height="40" rx="9" fill="#231d08" stroke="#9c8226"/>
    <text x="230" y="1020" text-anchor="middle" class="title" font-size="15" fill="#ffe79a">⚖️ THE JUDGE · THE TRAINER</text>
    <text x="84" y="1062" class="sub" font-size="13">grades Toadette + toadies (always the</text>
    <text x="84" y="1082" class="sub" font-size="13">strong model — never self-graded)</text>
    <text x="84" y="1106" class="sub" font-size="13">mentors Toadette · takes handoff when stuck</text>
    <text x="84" y="1140" class="sub mono" font-size="12.5">Claude Code · Codex (Robot)</text>
    <text x="84" y="1166" class="mono" font-size="12.5" fill="#ffb454">★ goal: get called LESS over time ↓</text>

    <!-- ===================== NODES (workbench) ===================== -->
    <!-- TOADETTE -->
    <g filter="url(#glow)"><rect x="580" y="240" width="540" height="220" rx="18" fill="url(#gToad)" stroke="#b07cff" stroke-width="2.5"/></g>
    <text x="605" y="300" class="title" font-size="30" fill="#caa8ff">TOADETTE</text>
    <rect x="900" y="262" width="196" height="30" rx="8" fill="#2a1d4a" stroke="#7d5bd0"/>
    <text x="998" y="283" text-anchor="middle" class="mono" font-size="12.5" fill="#d9c6ff">3rd · in training</text>
    <text x="605" y="332" class="sub" font-size="16">“The Manager” · agentic orchestrator</text>
    <rect x="605" y="356" width="300" height="34" rx="8" fill="#2a1d4a" stroke="#7d5bd0"/>
    <text x="755" y="379" text-anchor="middle" class="mono" font-size="14" fill="#d9c6ff">7B-class · GPU · interactive</text>
    <text x="605" y="420" class="sub" font-size="14">plans · picks toady · synthesizes answer</text>

    <!-- DISPATCHER -->
    <g filter="url(#soft)"><rect x="580" y="660" width="470" height="160" rx="16" fill="#0d2230" stroke="#5ad6e0" stroke-width="2.5"/></g>
    <text x="605" y="710" class="title" font-size="22" fill="#8be8f0">⇆ Dispatcher</text>
    <text x="605" y="737" class="sub" font-size="14">the distribution layer (thin router)</text>
    <text x="605" y="765" class="mono sub" font-size="13">invoke(toady, payload)</text>
    <text x="605" y="788" class="mono sub" font-size="13">→ resolve tier · box · model</text>
    <text x="605" y="811" class="mono sub" font-size="13">→ call in-proc OR LocalAI endpoint</text>

    <!-- REGISTRY -->
    <g filter="url(#soft)"><rect x="1190" y="660" width="420" height="160" rx="16" fill="#101826" stroke="#8aa0c4" stroke-width="2" stroke-dasharray="2 4"/></g>
    <text x="1215" y="705" class="title" font-size="20" fill="#b9c8e2">📄 toady_registry.toml</text>
    <text x="1215" y="730" class="sub" font-size="13">static · inspectable · fail-closed</text>
    <text x="1215" y="756" class="mono sub" font-size="12.5">[boxes.workbench] url=…:443</text>
    <text x="1215" y="777" class="mono sub" font-size="12.5">[boxes.desktop]   url=…:8080</text>
    <text x="1215" y="798" class="mono sub" font-size="12.5">[routing] fallback="workbench"</text>

    <!-- DETERMINISTIC CLUSTER -->
    <g filter="url(#soft)"><rect x="540" y="910" width="640" height="330" rx="16" fill="#0c2018" stroke="#37d6a0" stroke-width="2"/></g>
    <text x="565" y="955" class="title" font-size="20" fill="#6ff0c2">Deterministic toadies</text>
    <text x="565" y="980" class="sub mono" font-size="13">in-process · no model · no network · free</text>
    <g class="mono">
      <rect x="565" y="1000" width="280" height="52" rx="9" fill="#103022" stroke="#2f7a5e"/>
      <text x="705" y="1032" text-anchor="middle" font-size="16" fill="#bff5df">🦎 Gremlin · log compress</text>
      <rect x="865" y="1000" width="290" height="52" rx="9" fill="#103022" stroke="#2f7a5e"/>
      <text x="1010" y="1032" text-anchor="middle" font-size="16" fill="#bff5df">🛂 Bouncer · secret scan</text>
      <rect x="565" y="1066" width="280" height="52" rx="9" fill="#103022" stroke="#2f7a5e"/>
      <text x="705" y="1098" text-anchor="middle" font-size="16" fill="#bff5df">🧮 Accountant · ledger</text>
      <rect x="865" y="1066" width="290" height="52" rx="9" fill="#0e2419" stroke="#235f48" stroke-dasharray="3 4"/>
      <text x="1010" y="1098" text-anchor="middle" font-size="15" fill="#7fcfae">＋ Scout / Janitor (todo)</text>
    </g>
    <text x="565" y="1160" class="sub" font-size="13">Bouncer fail-closed → still runs even on fallback</text>
    <text x="565" y="1182" class="sub" font-size="13">(in-proc: no “box down” failure mode)</text>

    <!-- GPU LOCALAI -->
    <g filter="url(#glow)"><rect x="1340" y="980" width="600" height="320" rx="16" fill="#2a1024" stroke="#ff6ac1" stroke-width="2.5"/></g>
    <text x="1365" y="1025" class="title" font-size="21" fill="#ff9ad6">⚡ Ollama (GPU)</text>
    <text x="1365" y="1050" class="sub mono" font-size="13">workbench · :443 / :8443 · Vulkan</text>
    <rect x="1365" y="1070" width="550" height="46" rx="9" fill="#3a1530" stroke="#a8467f"/>
    <text x="1640" y="1099" text-anchor="middle" class="mono" font-size="15" fill="#ffc6e9">gpu-model tier · interactive 7B Q4_K_M</text>
    <rect x="1365" y="1126" width="550" height="60" rx="9" fill="#3a1530" stroke="#ff5d6c" stroke-dasharray="8 6"/>
    <text x="1640" y="1152" text-anchor="middle" class="mono" font-size="14" fill="#ffb3bf">★ FALLBACK TARGET</text>
    <text x="1640" y="1173" text-anchor="middle" class="sub" font-size="12.5">if desktop down → same model re-runs here</text>
    <text x="1365" y="1230" class="sub" font-size="13">⚠ any cpu-model’s model must also load here</text>
    <text x="1365" y="1252" class="sub" font-size="13">else fallback fails → ToadyUnavailable error</text>

    <!-- TRUST LOOP -->
    <g filter="url(#soft)"><rect x="540" y="1270" width="640" height="270" rx="16" fill="#231d08" stroke="#ffd866" stroke-width="2"/></g>
    <text x="565" y="1312" class="title" font-size="20" fill="#ffe79a">⚖️ Trust-loop</text>
    <text x="565" y="1337" class="sub" font-size="13.5">the cloud judge’s verdicts drive the leash (EMA)</text>
    <text x="565" y="1362" class="sub mono" font-size="13">probation 100% → spot 20% → trusted 5% review</text>
    <rect x="565" y="1382" width="590" height="44" rx="9" fill="#322a10" stroke="#9c8226"/>
    <text x="860" y="1410" text-anchor="middle" class="mono" font-size="14" fill="#ffe79a">graded-good pairs → dataset.jsonl</text>
    <text x="565" y="1456" class="sub" font-size="13">slow to earn · fast to lose · one bad audit demotes</text>
    <text x="565" y="1478" class="sub" font-size="13">per-output confidence can escalate a shaky answer</text>
    <text x="565" y="1512" class="mono" font-size="13" fill="#ffb454">↑ trust ⇒ ↓ cloud calls ⇒ ↓ $ &amp; ↓ heat</text>

    <!-- TRAINING FLYWHEEL / ECONOMICS PANEL -->
    <g filter="url(#soft)"><rect x="1200" y="1330" width="800" height="210" rx="16" fill="#161019" stroke="#7a5a86" stroke-width="2"/></g>
    <text x="1225" y="1372" class="title" font-size="20" fill="#e7b8ff">⚙ THE TRAINING FLYWHEEL <tspan class="sub" font-size="14">— the balance we’re chasing</tspan></text>
    <text x="1225" y="1400" class="sub mono" font-size="13">cloud judge grades → competency ↑ → leash loosens → paid calls ↓</text>
    <rect x="1225" y="1418" width="360" height="34" rx="8" fill="#231408" stroke="#9c5a26"/>
    <text x="1245" y="1441" class="title" font-size="13.5" fill="#ffce85">💸 stop burning Codex / Claude tokens</text>
    <rect x="1225" y="1460" width="360" height="34" rx="8" fill="#231408" stroke="#9c5a26"/>
    <text x="1245" y="1483" class="title" font-size="13.5" fill="#ffce85">🌡️ don’t cook the 8 GB server</text>
    <text x="1225" y="1522" class="sub" font-size="13">⇢ balance point: local does the work, cloud only spot-checks</text>
    <!-- mini bar chart: review rate (cloud calls) falls -->
    <line x1="1640" y1="1512" x2="1980" y2="1512" stroke="#4a3a55" stroke-width="2"/>
    <rect x="1665" y="1400" width="70" height="112" rx="4" fill="#ff5d6c"/>
    <text x="1700" y="1392" text-anchor="middle" class="mono" font-size="12" fill="#ffb3bf">100%</text>
    <text x="1700" y="1530" text-anchor="middle" class="sub" font-size="11">probation</text>
    <rect x="1775" y="1470" width="70" height="42" rx="4" fill="#ffb454"/>
    <text x="1810" y="1462" text-anchor="middle" class="mono" font-size="12" fill="#ffce85">20%</text>
    <text x="1810" y="1530" text-anchor="middle" class="sub" font-size="11">spot-check</text>
    <rect x="1885" y="1498" width="70" height="14" rx="4" fill="#37d6a0"/>
    <text x="1920" y="1490" text-anchor="middle" class="mono" font-size="12" fill="#9af0cf">5%</text>
    <text x="1920" y="1530" text-anchor="middle" class="sub" font-size="11">trusted</text>
    <text x="1810" y="1372" text-anchor="middle" class="sub mono" font-size="12">review rate = how often the cloud is called</text>

    <!-- ===================== DESKTOP CPU LOCALAI ===================== -->
    <g filter="url(#glow)"><rect x="2170" y="290" width="580" height="540" rx="16" fill="#2a2410" stroke="#ffb454" stroke-width="2.5"/></g>
    <text x="2195" y="335" class="title" font-size="21" fill="#ffce85">🧰 Ollama (CPU)</text>
    <text x="2195" y="360" class="sub mono" font-size="13">dees-desktop · :8080 · soaks idle CPU</text>
    <text x="2195" y="392" class="sub" font-size="14">cpu-model tier — latency-tolerant grunt work:</text>
    <g class="mono">

<script>
const svg=document.getElementById('svg'), vp=document.getElementById('viewport'), stage=document.getElementById('stage');
let scale=1, tx=0, ty=0;
function apply(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
function zoomBy(f){const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,f);}
function zoomAt(px,py,f){
  const ns=Math.min(6,Math.max(0.25,scale*f));
  const vb=svg.viewBox.baseVal, r=stage.getBoundingClientRect();
  const s=Math.max(vb.width/r.width,vb.height/r.height);
  const ux=(px*s - tx)/scale, uy=(py*s - ty)/scale;
  scale=ns; tx=px*s-ux*scale; ty=py*s-uy*scale; apply();
}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.12:0.89);},{passive:false});
let drag=false,lx=0,ly=0;
stage.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;stage.classList.add('drag');stage.setPointerCapture(e.pointerId);});
stage.addEventListener('pointermove',e=>{if(!drag)return;const r=stage.getBoundingClientRect();const vb=svg.viewBox.baseVal;const s=Math.max(vb.width/r.width,vb.height/r.height);tx+=(e.clientX-lx)*s;ty+=(e.clientY-ly)*s;lx=e.clientX;ly=e.clientY;apply();});
stage.addEventListener('pointerup',e=>{drag=false;stage.classList.remove('drag');});
function fit(){scale=1;tx=0;ty=0;apply();}
fit();
</script>
