<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Toadette · One-Box Architecture (dees-workbench)</title>
<style>
  :root{--bg0:#080a10;--bg1:#0e1320;--ink:#e8eefb;--mut:#8aa0c4;
    --purple:#b07cff;--cyan:#5ad6e0;--green:#37d6a0;--amber:#ffb454;
    --magenta:#ff6ac1;--gold:#ffd866;--blue:#6ea8fe;--red:#ff5d6c;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:radial-gradient(1200px 800px at 30% 10%,#10182b 0%,var(--bg1) 40%,var(--bg0) 100%);
    color:var(--ink);font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden}
  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:16px;
    padding:10px 18px;background:linear-gradient(180deg,rgba(8,10,16,.96),rgba(8,10,16,.6));
    backdrop-filter:blur(6px);border-bottom:1px solid #1d2840}
  header h1{font-size:18px;margin:0;letter-spacing:.4px;white-space:nowrap}
  header h1 b{color:var(--purple)}
  .legend{display:flex;flex-wrap:wrap;gap:6px 13px;font-size:12px;color:var(--mut)}
  .legend .k{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .sw{width:12px;height:12px;border-radius:3px;box-shadow:0 0 8px currentColor}
  .ln{width:20px;height:0;border-top:3px solid currentColor}
  .ln.dash{border-top-style:dashed}.ln.dot{border-top-style:dotted}
  .ctrls{margin-left:auto;display:flex;gap:8px}
  .ctrls button{background:#16203a;color:var(--ink);border:1px solid #28365a;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .ctrls button:hover{background:#1e2c4d;border-color:#3a4f86}
  .hint{position:fixed;bottom:12px;left:18px;z-index:10;font-size:12px;color:var(--mut)}
  #stage{position:fixed;inset:56px 0 0 0;cursor:grab}#stage.drag{cursor:grabbing}
  svg{width:100%;height:100%;display:block}
  text{font-family:"Segoe UI",system-ui,sans-serif;fill:var(--ink)}
  .mono{font-family:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,Consolas,monospace}
  .title{font-weight:700}.sub{fill:var(--mut)}
</style>
</head>
<body>
<header>
  <h1><b>Toadette</b> · one-box architecture</h1>
  <div class="legend">
    <span class="k" style="color:var(--blue)"><span class="sw" style="background:currentColor"></span>Human</span>
    <span class="k" style="color:var(--gold)"><span class="sw" style="background:currentColor"></span>Cloud Judge/Trainer</span>
    <span class="k" style="color:var(--purple)"><span class="sw" style="background:currentColor"></span>Toadette</span>
    <span class="k" style="color:var(--cyan)"><span class="sw" style="background:currentColor"></span>Dispatcher/Registry</span>
    <span class="k" style="color:var(--green)"><span class="sw" style="background:currentColor"></span>Deterministic</span>
    <span class="k" style="color:var(--magenta)"><span class="sw" style="background:currentColor"></span>Ollama (model)</span>
    <span class="k" style="color:var(--blue)"><span class="ln"></span>request</span>
    <span class="k" style="color:var(--green)"><span class="ln dash"></span>result</span>
    <span class="k" style="color:var(--gold)"><span class="ln dot"></span>grade/mentor</span>
  </div>
  <div class="ctrls">
    <button onclick="zoomBy(1.2)">＋</button><button onclick="zoomBy(0.83)">－</button><button onclick="fit()">Fit</button>
  </div>
</header>

<div id="stage">
<svg id="svg" viewBox="0 0 2600 1690" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="gWork" cx="35%" cy="0%" r="120%"><stop offset="0%" stop-color="#16223c"/><stop offset="100%" stop-color="#0c1322"/></radialGradient>

    <linearGradient id="gCloud" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a2a14"/><stop offset="100%" stop-color="#15160a"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/></filter>

    <marker id="aMag" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff6ac1"/></marker>

    <marker id="aRed" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#ff5d6c"/></marker>
    <marker id="aCyan" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#5ad6e0"/></marker>
  </defs>

  <g id="viewport">

    <!-- ===== THE ONE BOX ===== -->
    <g filter="url(#soft)"><rect x="440" y="120" width="1480" height="1300" rx="22" fill="url(#gWork)" stroke="#2f4a7a" stroke-width="2.5"/></g>
    <rect x="440" y="120" width="1480" height="56" rx="22" fill="#15233f"/>
    <text x="470" y="157" class="title" font-size="25">🖥️ dees-workbench.local <tspan class="sub mono" font-size="15">— the ONLY machine · RX 580 8GB · Ollama (native, Vulkan)</tspan></text>

    <!-- ===== EDGES (under nodes) ===== -->
    <line x1="230" y1="270" x2="230" y2="1090" stroke="#3a4a6a" stroke-width="2" stroke-dasharray="2 8"/>
    <!-- dee -> caddy -->
    <path d="M390,360 C470,330 500,300 540,278" fill="none" stroke="#6ea8fe" stroke-width="3" marker-end="url(#aBlue)"/>
    <!-- devices -> caddy -->
    <path d="M390,980 C470,560 480,340 540,300" fill="none" stroke="#6ea8fe" stroke-width="2.5" stroke-dasharray="2 6" opacity=".8" marker-end="url(#aBlue)"/>
    <!-- caddy -> toadette -->
    <path d="M720,316 L720,360" fill="none" stroke="#6ea8fe" stroke-width="3" marker-end="url(#aBlue)"/>
    <!-- toadette -> dispatcher -->
    <path d="M700,556 L700,600" fill="none" stroke="#6ea8fe" stroke-width="3" marker-end="url(#aBlue)"/>
    <!-- dispatcher <-> registry -->
    <path d="M1000,665 L1060,665" fill="none" stroke="#5ad6e0" stroke-width="3" marker-end="url(#aCyan)"/>

    <!-- dispatcher -> deterministic -->
    <path d="M660,750 L660,810" fill="none" stroke="#37d6a0" stroke-width="3" marker-end="url(#aGreen)"/>
    <!-- dispatcher -> ollama -->
    <path d="M1000,720 C1110,800 1170,860 1230,910" fill="none" stroke="#ff6ac1" stroke-width="3" marker-end="url(#aMag)"/>
    <!-- ollama -> toadette (result) -->
    <path d="M1230,940 C1080,910 920,720 840,556" fill="none" stroke="#37d6a0" stroke-width="2.5" stroke-dasharray="9 7" opacity=".85" marker-end="url(#aGreen)"/>
    <!-- cloud -> toadette (mentor) -->
    <path d="M300,560 C330,500 460,470 540,452" fill="none" stroke="#ffd866" stroke-width="2.5" stroke-dasharray="10 6" opacity=".9" marker-end="url(#aGold)"/>
    <!-- cloud -> trust (grade) -->
    <path d="M310,800 C420,1000 470,1110 520,1180" fill="none" stroke="#ffd866" stroke-width="3" stroke-dasharray="3 7" marker-end="url(#aGold)"/>
    <!-- trust -> cloud (leash) -->
    <path d="M520,1300 C400,1230 350,1000 312,805" fill="none" stroke="#ff5d6c" stroke-width="2.5" stroke-dasharray="9 7" opacity=".9" marker-end="url(#aRed)"/>
    <!-- ollama -> trust (outputs to grade) -->
    <path d="M1280,1160 C1180,1190 1140,1190 1120,1190" fill="none" stroke="#ffd866" stroke-width="2.5" stroke-dasharray="3 7" marker-end="url(#aGold)"/>

    <!-- ===== CHAIN OF COMMAND (left, external) ===== -->
    <text x="56" y="252" class="mono" font-size="15" fill="#6a7ea4">CHAIN OF COMMAND ▾</text>
    <!-- Dee -->
    <g filter="url(#soft)"><rect x="50" y="290" width="340" height="160" rx="16" fill="#0f1a30" stroke="#6ea8fe" stroke-width="2.5"/></g>
    <text x="74" y="336" class="title" font-size="24" fill="#bcd6ff">🧑‍✈️ DEE</text>
    <rect x="250" y="312" width="120" height="28" rx="8" fill="#13294a" stroke="#3a6db0"/><text x="310" y="332" text-anchor="middle" class="mono" font-size="12.5" fill="#9cc2ff">1st in command</text>
    <text x="74" y="372" class="sub" font-size="14">the human · sets direction</text>
    <text x="74" y="398" class="sub" font-size="13.5">talks to Toadette over HTTPS</text>
    <!-- Cloud -->
    <g filter="url(#glow)"><rect x="50" y="560" width="340" height="250" rx="16" fill="url(#gCloud)" stroke="#ffd866" stroke-width="2.5"/></g>
    <text x="74" y="606" class="title" font-size="20" fill="#ffe79a">☁️ CLAUDE / ROBOT</text>
    <rect x="250" y="582" width="122" height="28" rx="8" fill="#2a2410" stroke="#9c8226"/><text x="311" y="602" text-anchor="middle" class="mono" font-size="12" fill="#ffe79a">2nd in command</text>
    <text x="74" y="636" class="sub" font-size="13.5">paid cloud AI · over API · 💸 per token</text>
    <rect x="74" y="652" width="292" height="38" rx="9" fill="#231d08" stroke="#9c8226"/><text x="220" y="677" text-anchor="middle" class="title" font-size="14.5" fill="#ffe79a">⚖️ THE JUDGE · THE TRAINER</text>
    <text x="74" y="718" class="sub" font-size="13">grades Toadette + toadies (strong model;</text>
    <text x="74" y="738" class="sub" font-size="13">never self-graded) · mentors when stuck</text>
    <text x="74" y="772" class="mono" font-size="12.5" fill="#ffb454">★ goal: get called LESS over time ↓</text>
    <!-- Devices -->
    <g filter="url(#soft)"><rect x="50" y="900" width="340" height="190" rx="16" fill="#0f1a30" stroke="#6ea8fe" stroke-width="2"/></g>
    <text x="74" y="944" class="title" font-size="18" fill="#bcd6ff">🖥️ YOUR DEVICES</text>
    <text x="74" y="968" class="sub" font-size="13">clients over HTTPS (trusted cert)</text>
    <rect x="74" y="984" width="140" height="40" rx="9" fill="#13233f" stroke="#2c466f"/><text x="144" y="1009" text-anchor="middle" font-size="14">🍎 Mac</text>
    <rect x="224" y="984" width="142" height="40" rx="9" fill="#13233f" stroke="#2c466f"/><text x="295" y="1009" text-anchor="middle" font-size="13">🪟 SBE-Lenovo</text>
    <text x="74" y="1058" class="sub" font-size="12.5">laptop = client now; could be a future</text>
    <text x="74" y="1076" class="sub" font-size="12.5">occasional worker (registry supports it)</text>

    <!-- ===== NODES inside the box ===== -->
    <!-- Caddy -->
    <g filter="url(#soft)"><rect x="540" y="232" width="360" height="84" rx="14" fill="#0d2230" stroke="#5ad6e0" stroke-width="2"/></g>
    <text x="560" y="268" class="title" font-size="17" fill="#8be8f0">🔒 Caddy · HTTPS front</text>
    <text x="560" y="294" class="sub mono" font-size="12.5">:443/:8443 · trusted cert · 80→443</text>

    <!-- Toadette -->
    <g filter="url(#glow)"><rect x="540" y="360" width="520" height="196" rx="18" fill="url(#gToad)" stroke="#b07cff" stroke-width="2.5"/></g>
    <text x="565" y="418" class="title" font-size="29" fill="#caa8ff">TOADETTE</text>
    <rect x="858" y="382" width="186" height="28" rx="8" fill="#2a1d4a" stroke="#7d5bd0"/><text x="951" y="402" text-anchor="middle" class="mono" font-size="12" fill="#d9c6ff">3rd · in training</text>
    <text x="565" y="448" class="sub" font-size="15">“The Manager” · agentic orchestrator</text>
    <rect x="565" y="470" width="290" height="32" rx="8" fill="#2a1d4a" stroke="#7d5bd0"/><text x="710" y="492" text-anchor="middle" class="mono" font-size="13" fill="#d9c6ff">runs on the workbench Ollama</text>
    <text x="565" y="536" class="sub" font-size="14">plans · picks toady · synthesizes answer</text>

    <!-- Dispatcher -->
    <g filter="url(#soft)"><rect x="540" y="600" width="460" height="150" rx="16" fill="#0d2230" stroke="#5ad6e0" stroke-width="2.5"/></g>
    <text x="565" y="646" class="title" font-size="21" fill="#8be8f0">⇆ Dispatcher</text>
    <text x="565" y="672" class="sub" font-size="13.5">the distribution layer (thin router)</text>
    <text x="565" y="700" class="mono sub" font-size="12.5">dispatch.run(toady, payload)</text>
    <text x="565" y="722" class="mono sub" font-size="12.5">→ resolve tier → in-proc OR Ollama</text>

    <!-- Registry -->
    <g filter="url(#soft)"><rect x="1060" y="600" width="400" height="150" rx="16" fill="#101826" stroke="#8aa0c4" stroke-width="2" stroke-dasharray="2 4"/></g>
    <text x="1085" y="644" class="title" font-size="19" fill="#b9c8e2">📄 toady_registry.toml</text>
    <text x="1085" y="668" class="sub" font-size="12.5">static · one box · future-proof</text>
    <text x="1085" y="694" class="mono sub" font-size="12">[boxes.workbench] url=…:443</text>
    <text x="1085" y="715" class="mono sub" font-size="12">[routing] fallback="workbench"</text>
    <text x="1085" y="736" class="mono sub" font-size="12">toadies → tier · model</text>

    <!-- Deterministic cluster -->
    <g filter="url(#soft)"><rect x="520" y="810" width="600" height="290" rx="16" fill="#0c2018" stroke="#37d6a0" stroke-width="2"/></g>
    <text x="545" y="854" class="title" font-size="19" fill="#6ff0c2">Deterministic toadies</text>
    <text x="545" y="878" class="sub mono" font-size="12.5">in-process · no model · no network · free</text>
    <g class="mono">
      <rect x="545" y="898" width="262" height="48" rx="9" fill="#103022" stroke="#2f7a5e"/><text x="676" y="928" text-anchor="middle" font-size="15" fill="#bff5df">🦎 Gremlin · log compress</text>
      <rect x="827" y="898" width="268" height="48" rx="9" fill="#103022" stroke="#2f7a5e"/><text x="961" y="928" text-anchor="middle" font-size="15" fill="#bff5df">🛂 Bouncer · secret scan</text>
      <rect x="545" y="960" width="262" height="48" rx="9" fill="#103022" stroke="#2f7a5e"/><text x="676" y="990" text-anchor="middle" font-size="15" fill="#bff5df">🧮 Accountant · ledger</text>
      <rect x="827" y="960" width="268" height="48" rx="9" fill="#0e2419" stroke="#235f48" stroke-dasharray="3 4"/><text x="961" y="990" text-anchor="middle" font-size="14" fill="#7fcfae">＋ Scout / Janitor (todo)</text>
    </g>
    <text x="545" y="1048" class="sub" font-size="13">3 built · all TDD · MCP-callable today</text>
    <text x="545" y="1072" class="sub" font-size="13">Bouncer fail-closed (never skipped)</text>

    <!-- Ollama engine -->
    <g filter="url(#glow)"><rect x="1180" y="786" width="700" height="370" rx="16" fill="#2a1024" stroke="#ff6ac1" stroke-width="2.5"/></g>
    <text x="1205" y="830" class="title" font-size="21" fill="#ff9ad6">⚡ Ollama — ONE engine</text>
    <text x="1205" y="855" class="sub mono" font-size="13">native · Vulkan · :443 via Caddy</text>
    <rect x="1205" y="876" width="650" height="52" rx="10" fill="#3a1530" stroke="#ff5d6c"/>
    <text x="1530" y="900" text-anchor="middle" class="title" font-size="15" fill="#ffd0e6">GPU + automatic CPU overflow</text>
    <text x="1530" y="920" text-anchor="middle" class="sub" font-size="12">Ollama spills a too-big model to CPU itself — no 2nd machine</text>
    <text x="1205" y="958" class="sub" font-size="13.5">model-backed toadies (one Ollama serves all):</text>
    <g class="mono">
      <rect x="1205" y="974" width="650" height="44" rx="9" fill="#3a1530" stroke="#a8467f"/><text x="1530" y="1002" text-anchor="middle" font-size="14" fill="#ffc6e9">✍️ Scribe · prose/summarize (llama3.2:3b)</text>
      <rect x="1205" y="1028" width="318" height="44" rx="9" fill="#3a1530" stroke="#a8467f"/><text x="1364" y="1056" text-anchor="middle" font-size="13.5" fill="#ffc6e9">🔎 Embeddings</text>
      <rect x="1537" y="1028" width="318" height="44" rx="9" fill="#3a1530" stroke="#a8467f"/><text x="1696" y="1056" text-anchor="middle" font-size="13.5" fill="#ffc6e9">🏷️ Classifier</text>
    </g>
    <text x="1205" y="1102" class="sub" font-size="12.5">OpenAI /v1 · native /api for logprobs (confidence)</text>
    <text x="1205" y="1124" class="sub" font-size="12.5">100% GPU when it fits (e.g. 3B → ~64 tok/s)</text>

    <!-- Trust-loop -->
    <g filter="url(#soft)"><rect x="520" y="1130" width="600" height="250" rx="16" fill="#231d08" stroke="#ffd866" stroke-width="2"/></g>
    <text x="545" y="1172" class="title" font-size="19" fill="#ffe79a">⚖️ Trust-loop</text>
    <text x="545" y="1196" class="sub" font-size="13">the cloud judge’s verdicts drive the leash (EMA)</text>
    <text x="545" y="1221" class="mono sub" font-size="12.5">probation 100% → spot 20% → trusted 5% review</text>
    <rect x="545" y="1240" width="552" height="42" rx="9" fill="#322a10" stroke="#9c8226"/><text x="821" y="1267" text-anchor="middle" class="mono" font-size="13.5" fill="#ffe79a">graded-good pairs → dataset.jsonl</text>
    <text x="545" y="1312" class="sub" font-size="12.5">slow to earn · fast to lose · one bad audit demotes</text>
    <text x="545" y="1334" class="mono" font-size="12.5" fill="#ffb454">↑ trust ⇒ ↓ cloud calls ⇒ ↓ $ &amp; ↓ heat</text>

    <!-- Flywheel -->
    <g filter="url(#soft)"><rect x="1180" y="1190" width="700" height="190" rx="16" fill="#161019" stroke="#7a5a86" stroke-width="2"/></g>
    <text x="1205" y="1230" class="title" font-size="18" fill="#e7b8ff">⚙ THE TRAINING FLYWHEEL</text>
    <text x="1205" y="1256" class="sub mono" font-size="12.5">grade → competency↑ → leash loosens → paid calls↓</text>
    <rect x="1205" y="1274" width="330" height="32" rx="8" fill="#231408" stroke="#9c5a26"/><text x="1222" y="1296" class="title" font-size="13" fill="#ffce85">💸 stop burning Codex/Claude tokens</text>
    <rect x="1205" y="1314" width="330" height="32" rx="8" fill="#231408" stroke="#9c5a26"/><text x="1222" y="1336" class="title" font-size="13" fill="#ffce85">🌡️ don’t cook the 8 GB box</text>
    <line x1="1570" y1="1356" x2="1860" y2="1356" stroke="#4a3a55" stroke-width="2"/>
    <rect x="1590" y="1252" width="58" height="104" rx="4" fill="#ff5d6c"/><text x="1619" y="1245" text-anchor="middle" class="mono" font-size="11" fill="#ffb3bf">100%</text>
    <rect x="1680" y="1316" width="58" height="40" rx="4" fill="#ffb454"/><text x="1709" y="1309" text-anchor="middle" class="mono" font-size="11" fill="#ffce85">20%</text>
    <rect x="1770" y="1342" width="58" height="14" rx="4" fill="#37d6a0"/><text x="1799" y="1335" text-anchor="middle" class="mono" font-size="11" fill="#9af0cf">5%</text>
    <text x="1724" y="1374" text-anchor="middle" class="sub" font-size="11">review rate (cloud calls) ↓ over time</text>

    <!-- ===== RIGHT: why one box + tier key ===== -->
    <g filter="url(#soft)"><rect x="1960" y="232" width="600" height="300" rx="16" fill="#101a14" stroke="#2f7a5e" stroke-width="2"/></g>
    <text x="1985" y="276" class="title" font-size="20" fill="#9af0cf">Why ONE box?</text>
    <text x="1985" y="306" class="sub" font-size="13.5">There is no second machine. “dees-desktop”</text>
    <text x="1985" y="328" class="sub" font-size="13.5">was a typo for dees-workbench.</text>
    <rect x="1985" y="348" width="548" height="64" rx="10" fill="#0c2018" stroke="#2f7a5e"/>
    <text x="2005" y="374" class="title" font-size="14" fill="#bff5df">Ollama auto-shares GPU + CPU</text>
    <text x="2005" y="396" class="sub" font-size="12.5">(unlike LocalAI) — so the idle CPU is used</text>
    <text x="1985" y="442" class="sub" font-size="13">automatically; no separate CPU instance or</text>
    <text x="1985" y="464" class="sub" font-size="13">“federation” needed. The registry still allows</text>
    <text x="1985" y="486" class="sub" font-size="13">extra boxes later (e.g. the laptop) — future-proof,</text>
    <text x="1985" y="508" class="sub" font-size="13">just not wired today.</text>

    <g filter="url(#soft)"><rect x="1960" y="560" width="600" height="300" rx="16" fill="#0e1626" stroke="#33415c" stroke-width="2"/></g>

<script>
const svg=document.getElementById('svg'),vp=document.getElementById('viewport'),stage=document.getElementById('stage');
let scale=1,tx=0,ty=0;
function apply(){vp.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`);}
function zoomBy(f){const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,f);}
function zoomAt(px,py,f){const ns=Math.min(6,Math.max(0.25,scale*f));const vb=svg.viewBox.baseVal,r=stage.getBoundingClientRect();const s=Math.max(vb.width/r.width,vb.height/r.height);const ux=(px*s-tx)/scale,uy=(py*s-ty)/scale;scale=ns;tx=px*s-ux*scale;ty=py*s-uy*scale;apply();}
stage.addEventListener('wheel',e=>{e.preventDefault();const r=stage.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:0.89);},{passive:false});
let drag=false,lx=0,ly=0;
stage.addEventListener('pointerdown',e=>{drag=true;lx=e.clientX;ly=e.clientY;stage.classList.add('drag');stage.setPointerCapture(e.pointerId);});
stage.addEventListener('pointermove',e=>{if(!drag)return;const r=stage.getBoundingClientRect();const vb=svg.viewBox.baseVal;const s=Math.max(vb.width/r.width,vb.height/r.height);tx+=(e.clientX-lx)*s;ty+=(e.clientY-ly)*s;lx=e.clientX;ly=e.clientY;apply();});
stage.addEventListener('pointerup',e=>{drag=false;stage.classList.remove('drag');});
function fit(){scale=1;tx=0;ty=0;apply();}
fit();
</script>
